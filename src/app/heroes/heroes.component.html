<div>
    <ul>
        <li *ngFor="let hero of hero">
            <button [class.selected]="hero === selectedHero" type="button"
             (click)="onSelect(hero)"> 
                <span class="id">{{hero.id}}</span> 
                <span class="name">{{hero.name}}</span>
            </button>    
        </li>
    </ul>
</div>

<app-hero-detail [hero]="selectedHero"></app-hero-detail>
